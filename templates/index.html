<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OSRS Item Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class='bg-danger'>
    <h2 class="text-warning">OSRS Item Tracker</h2>

    <nav class="navbar navbar-expand-sm bg-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/addItem">Add Item</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="itemDisplay">Item Collection</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="removeItems">Remove item</a>
                </li>
            </ul>
        </div>
    </nav>
    <!-- 
    <a href="/">Home</a>
    <a href="/addItem">Add Item</a>
    <a href="/itemDisplay">Item Collection</a>
    <a href="/removeItems">Remove Item</a> -->

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p>{{message}}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block body %}


    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
