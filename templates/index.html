<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OSRS Item Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="pricing.css" rel="stylesheet">
</head>

<body>
    <div class="container py-3">

        <header>
            <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom">
                <a href="/" class="d-flex align-items-center link-body-emphasis text-decoration-none">
                    <svg xmlns="GeLogo.svg" width="40" height="32" class="me-2" viewBox="0 0 118 94" role="img"></svg>
                    <span class="fs-4">OSRS Item Tracker</span>
                </a>
                <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
                    <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="/">Home</a>
                    <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="/addItem">Add Item</a>
                    <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="itemDisplay">Item Collection</a>
                    <a class="py-2 link-body-emphasis text-decoration-none" href="removeItems">Remove item</a>
                </nav>
            </div>
        </header>

    </div>

    {% block body %}


    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
